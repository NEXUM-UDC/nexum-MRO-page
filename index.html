<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexum — MRO Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0F1E;
    --surface:   #111827;
    --surface2:  #1A2236;
    --border:    #1E2D45;
    --accent:    #00D4FF;
    --accent2:   #0099BB;
    --text:      #E8EDF5;
    --muted:     #6B7A99;
    --success:   #00E5A0;
    --warning:   #FFB800;
    --danger:    #FF4D6A;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-size: 12px; margin-left: 10px; letter-spacing: 0.12em; }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .breadcrumb .crumb { color: var(--text); cursor: pointer; }
  .breadcrumb .crumb:hover { color: var(--accent); }
  .breadcrumb .sep { color: var(--border); }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--mono); color: var(--success);
    letter-spacing: 0.1em;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── SCREENS ── */
  .screen { display: none; padding: 32px; max-width: 1100px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── PAGE TITLE ── */
  .page-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .page-heading {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-bottom: 28px;
    max-width: 420px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  /* ── CUSTOMER GRID ── */
  .customer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .customer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .customer-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.2s;
  }
  .customer-card:hover { border-color: var(--accent); background: var(--surface2); }
  .customer-card:hover::before { transform: scaleY(1); }
  .customer-card.new-ping { animation: ping 0.6s ease; }
  @keyframes ping {
    0%   { border-color: var(--accent); box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
    100% { border-color: var(--border); box-shadow: 0 0 0 12px rgba(0,212,255,0); }
  }
  .customer-name { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .customer-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .customer-count {
    margin-top: 14px;
    display: flex; gap: 12px;
  }
  .count-pill {
    font-family: var(--mono); font-size: 11px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .count-pill.has-items { border-color: var(--accent); color: var(--accent); }

  /* ── STAGE GRID (screen 2) ── */
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .stage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .stage-card:hover { border-color: var(--accent); background: var(--surface2); }
  .stage-label {
    font-size: 11px; font-family: var(--mono);
    color: var(--muted); letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .stage-name { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .stage-badge {
    font-family: var(--mono); font-size: 12px;
    color: var(--accent); letter-spacing: 0.05em;
  }

  /* updates card */
  .updates-card {
    background: var(--surface);
    border: 1px solid var(--success);
    padding: 18px 20px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 14px;
  }
  .updates-card:hover { background: var(--surface2); }
  .updates-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  .updates-text { font-size: 14px; font-weight: 500; }
  .updates-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

  /* ── RO LIST (screen 3) ── */
  .ro-list { display: flex; flex-direction: column; gap: 10px; }
  .ro-row {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .ro-row:hover { border-color: var(--accent); background: var(--surface2); }
  .ro-number { font-family: var(--mono); font-size: 14px; color: var(--accent); }
  .ro-pn { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .ro-date { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .ro-status {
    font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em;
    padding: 4px 10px; border: 1px solid;
    text-transform: uppercase;
  }
  .status-open   { color: var(--accent);   border-color: var(--accent); }
  .status-action { color: var(--warning);  border-color: var(--warning); }
  .status-done   { color: var(--success);  border-color: var(--success); }

  /* ── TABLE HEADER ── */
  .table-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 16px;
    padding: 8px 20px;
    font-size: 10px; font-family: var(--mono);
    color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,15,30,0.85);
    z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 680px; max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-ro { font-family: var(--mono); font-size: 18px; color: var(--accent); }
  .modal-customer { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  .modal-close {
    background: none; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; padding: 6px 10px; font-size: 14px;
    transition: border-color 0.2s, color 0.2s;
  }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }

  .modal-body { padding: 24px; }

  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 24px;
  }
  .info-field label {
    font-size: 10px; font-family: var(--mono);
    color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
    display: block; margin-bottom: 4px;
  }
  .info-field .val {
    font-family: var(--mono); font-size: 14px; color: var(--text);
  }

  .section-label {
    font-size: 10px; font-family: var(--mono);
    color: var(--muted); letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  /* thread */
  .thread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .message {
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }
  .message.inbound { border-left: 3px solid var(--accent); }
  .message.outbound { border-left: 3px solid var(--success); }
  .msg-meta {
    font-size: 11px; font-family: var(--mono); color: var(--muted);
    margin-bottom: 6px; display: flex; justify-content: space-between;
  }
  .msg-from { color: var(--text); }
  .msg-body { font-size: 13px; line-height: 1.6; }

  /* compose */
  .compose { margin-top: 4px; }
  .compose textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono); font-size: 13px;
    padding: 12px 14px;
    resize: vertical; min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .compose textarea:focus { border-color: var(--accent); }
  .compose-actions {
    display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;
  }
  .btn {
    padding: 9px 18px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    cursor: pointer; border: 1px solid; transition: background 0.2s, color 0.2s;
  }
  .btn-primary {
    background: var(--accent); border-color: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-ghost {
    background: transparent; border-color: var(--border); color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  /* docs */
  .docs-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .doc-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .doc-name { font-family: var(--mono); font-size: 12px; }
  .doc-tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    padding: 2px 8px; border: 1px solid var(--border); color: var(--muted);
  }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--accent);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 12px 18px; z-index: 999;
    display: flex; align-items: center; gap: 10px;
    transform: translateY(80px); opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* empty state */
  .empty {
    padding: 48px 0; text-align: center;
    font-family: var(--mono); font-size: 13px; color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">NEXUM <span>MRO PORTAL</span></div>

<!-- ══════════════════════════════════════════
     SCREEN 1 — CUSTOMERS
══════════════════════════════════════════ -->
<div class="screen active" id="screen1">

</div>

<!-- ══════════════════════════════════════════

══════════════════════════════════════════ -->
<div class="screen" id="screen2">
  <div class="page-title">REPAIR LIFECYCLE</div>

  <div style="margin-bottom:20px">

<!-- ══════════════════════════════════════════

<div class="screen" id="screen3">

</div>

<!-- ══════════════════════════════════════════

══════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-ro" id="modalRO">RO-000000</div>
        <div class="modal-customer" id="modalCustomer">—</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕ CLOSE</button>
    </div>
    <div class="modal-body">
      <div class="info-grid" id="infoGrid"></div>
      <hr class="divider">
      <div class="section-label">Documents</div>
      <div class="docs-list" id="docsList"></div>
      <hr class="divider">
      <div class="section-label">Message Thread</div>
      <div class="thread" id="thread"></div>
      <div class="compose">
        <textarea id="composeBox" placeholder="Type a message to send to this customer..."></textarea>
        <div class="compose-actions">
          <button class="btn btn-ghost" onclick="draftWithAI()">⚡ AI Draft</button>
          <button class="btn btn-primary" onclick="sendMessage()">Send Update →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>

</div>

// STATE
// ══════════════════════════════════════════
let currentCustomer = null;
let currentStage    = null;

// stage definitions — order matches your flowchart
const STAGES = [
  { key:"RFQ/capability request", label:"01 — RFQ",           name:"Request for Quote",     desc:"Capability checks & initial quotes" },
  { key:"Part shipped",           label:"02 — SHIPPED",       name:"Part Shipped",          desc:"Inbound tracking & receiving" },

// ══════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

function goScreen(n) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen" + n).classList.add("active");
  updateBreadcrumb(n);
  if (n === 1) renderCustomers();
}

function updateBreadcrumb(n) {
  const bc = document.getElementById("breadcrumb");
  if (n === 1) {
    bc.innerHTML = `<span class="crumb" onclick="goScreen(1)">Customers</span>`;
  } else if (n === 2) {
    bc.innerHTML = `<span class="crumb" onclick="goScreen(1)">Customers</span>
      <span class="sep">/</span>
      <span class="crumb">${currentCustomer}</span>`;
  } else if (n === 3) {
    bc.innerHTML = `<span class="crumb" onclick="goScreen(1)">Customers</span>
      <span class="sep">/</span>
      <span class="crumb" onclick="goScreen(2)">${currentCustomer}</span>
      <span class="sep">/</span>
      <span class="crumb">${currentStage}</span>`;
  }
}

// ══════════════════════════════════════════
// SCREEN 1 — CUSTOMERS
// ══════════════════════════════════════════
function getCustomers() {
  const map = {};
  parsedEmails.forEach(e => {
    if (!map[e.customer]) map[e.customer] = { name: e.customer, emails: [] };
    map[e.customer].emails.push(e);
  });
  return Object.values(map);
}

function renderCustomers(filter = "") {
  const grid = document.getElementById("customerGrid");
  const customers = getCustomers().filter(c =>
    c.name.toLowerCase().includes(filter.toLowerCase())
  );

  if (!customers.length) {
    grid.innerHTML = `<div class="empty">No customers found</div>`;
    return;
  }

  grid.innerHTML = customers.map(c => {
    const stageCounts = {};
    c.emails.forEach(e => {
      stageCounts[e.stage] = (stageCounts[e.stage] || 0) + 1;
    });
    const pills = Object.entries(stageCounts)
      .map(([s, n]) => `<span class="count-pill has-items">${n} ${s.split("/")[0].trim().toUpperCase()}</span>`)
      .join("");
    return `
      <div class="customer-card" id="card-${c.name.replace(/\s/g,'-')}" onclick="selectCustomer('${c.name}')">
        <div class="customer-name">${c.name}</div>
        <div class="customer-meta">${c.emails.length} repair order${c.emails.length !== 1 ? "s" : ""}</div>
        <div class="customer-count">${pills}</div>
      </div>`;
  }).join("");
}

function filterCustomers() {
  renderCustomers(document.getElementById("customerSearch").value);
}

function selectCustomer(name) {
  currentCustomer = name;
  renderStages();
  goScreen(2);
}

// ══════════════════════════════════════════
// SCREEN 2 — STAGES
// ══════════════════════════════════════════
function renderStages() {
  document.getElementById("screen2Heading").textContent = currentCustomer;
  const emails = parsedEmails.filter(e => e.customer === currentCustomer);

  // updates count
  const newCount = emails.filter(e => e.messages && e.messages[e.messages.length-1]?.dir === "inbound").length;
  document.getElementById("updatesSubtext").textContent = `${newCount} awaiting response`;

  const grid = document.getElementById("stageGrid");
  grid.innerHTML = STAGES.map(s => {
    const count = emails.filter(e => e.stage === s.key).length;
    return `
      <div class="stage-card" onclick="selectStage('${s.key}', '${s.name}')">
        <div class="stage-label">${s.label}</div>
        <div class="stage-name">${s.name}</div>
        <div class="stage-badge">${count > 0 ? count + " active" : "— none"}</div>
      </div>`;
  }).join("");
}

function openUpdates() {
  // show all emails for this customer, newest first, filtered to awaiting response
  const emails = parsedEmails.filter(e => e.customer === currentCustomer);
  if (!emails.length) return;
  openRO(emails[0]); // open most recent as a starting point
}

// ══════════════════════════════════════════
// SCREEN 3 — RO LIST
// ══════════════════════════════════════════
function selectStage(stageKey, stageName) {
  currentStage = stageName;
  const emails = parsedEmails.filter(e => e.customer === currentCustomer && e.stage === stageKey);

  document.getElementById("screen3Heading").textContent = stageName;

  const list = document.getElementById("roList");
  if (!emails.length) {
    list.innerHTML = `<div class="empty">No repair orders at this stage</div>`;
  } else {
    list.innerHTML = emails.map(e => {
      const lastMsg = e.messages[e.messages.length - 1];
      const needsReply = lastMsg?.dir === "inbound";
      const statusClass = needsReply ? "status-action" : "status-open";
      const statusText  = needsReply ? "REPLY NEEDED" : "OPEN";
      const dateStr = e.date ? e.date.split(" ").slice(1,4).join(" ") : "—";
      return `
        <div class="ro-row" onclick="openRO(parsedEmails.find(x=>x.ro==='${e.ro}'&&x.customer==='${e.customer}'&&x.stage==='${e.stage}'))">
          <div class="ro-number">${e.ro}</div>
          <div class="ro-pn">PN: ${e.pn || "—"} &nbsp;|&nbsp; SN: ${e.sn || "—"}</div>
          <div class="ro-date">${dateStr}</div>
          <div class="ro-status ${statusClass}">${statusText}</div>
        </div>`;
    }).join("");
  }

  goScreen(3);
}

// ══════════════════════════════════════════
// MODAL — RO DETAIL
// ══════════════════════════════════════════
function openRO(e) {
  if (!e) return;
  currentRO = e;

  document.getElementById("modalRO").textContent = e.ro || "—";
  document.getElementById("modalCustomer").textContent = `${e.customer} · ${e.stage}`;

  // info fields
  document.getElementById("infoGrid").innerHTML = [
    ["Part Number", e.pn || "—"],
    ["Serial Number", e.sn || "—"],
    ["RFQ", e.rfq || "—"],
    ["Date Received", e.date ? e.date.split(" ").slice(1,4).join(" ") : "—"],
    ["Stage", e.stage],
    ["Customer Contact", e.from || "—"],
  ].map(([k,v]) => `
    <div class="info-field">
      <label>${k}</label>
      <div class="val">${v}</div>
    </div>`).join("");

  // docs
  const dl = document.getElementById("docsList");
  if (e.docs && e.docs.length) {
    dl.innerHTML = e.docs.map(d => `
      <div class="doc-row">
        <div class="doc-name">📄 ${d.name}</div>
        <div class="doc-tag">${d.tag}</div>
      </div>`).join("");
  } else {
    dl.innerHTML = `<div class="empty" style="padding:16px 0">No documents attached</div>`;
  }

  // thread
  document.getElementById("thread").innerHTML = (e.messages || []).map(m => `
    <div class="message ${m.dir}">
      <div class="msg-meta">
        <span class="msg-from">${m.dir === "inbound" ? m.from : "You (Example MRO)"}</span>
        <span>${m.time}</span>
      </div>
      <div class="msg-body">${m.body}</div>
    </div>`).join("");

  document.getElementById("composeBox").value = "";
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function sendMessage() {
  const box = document.getElementById("composeBox");
  const text = box.value.trim();
  if (!text) return;
  const thread = document.getElementById("thread");
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;
  thread.innerHTML += `
    <div class="message outbound">
      <div class="msg-meta">
        <span class="msg-from">You (Example MRO)</span>
        <span>${time}</span>
      </div>
      <div class="msg-body">${text}</div>
    </div>`;
  box.value = "";
  thread.scrollTop = thread.scrollHeight;
  showToast(`Message sent to ${currentRO?.customer}`);
}

function draftWithAI() {
  const box = document.getElementById("composeBox");
  const e = currentRO;
  if (!e) return;
  // simulated AI draft based on stage
  const drafts = {
    "RFQ/capability request": `Dear ${e.customer} team,\n\nThank you for your inquiry. We confirm capability on PN ${e.pn || "the referenced part"}. We will proceed with evaluation and provide a firm quotation following teardown and inspection.\n\nEstimated TAT will be communicated with the quote.\n\nBest regards,\nExample MRO`,
    "Part shipped": `Dear ${e.customer} team,\n\nWe confirm receipt of PN ${e.pn || "the part"} SN ${e.sn || "—"} for RO ${e.ro}. Incoming inspection is underway and we will update you shortly.\n\nBest regards,\nExample MRO`,
    "Quote issued": `Dear ${e.customer} team,\n\nThank you for your patience. Please find our firm quotation attached for RO ${e.ro}. This quote is valid for 30 days. Please reply with written approval to proceed.\n\nBest regards,\nExample MRO`,
    "Quote approval": `Dear ${e.customer} team,\n\nThank you for the approval. We will commence work on RO ${e.ro} immediately and provide regular status updates.\n\nBest regards,\nExample MRO`,
    "Repair complete": `Dear ${e.customer} team,\n\nRO ${e.ro} has been completed. FAA Form 8130-3 and all required documentation are enclosed. The component is ready for return shipment — please confirm your shipping address.\n\nBest regards,\nExample MRO`,
  };
  box.value = drafts[e.stage] || `Dear ${e.customer} team,\n\nPlease see the update regarding RO ${e.ro}.\n\nBest regards,\nExample MRO`;
}

// ══════════════════════════════════════════
// SIMULATE INCOMING EMAIL (every 15s demo)
// ══════════════════════════════════════════
const incomingSimulation = [
  {
    customer: "United Airlines",
    rfq: "889900", ro: "RO-050505", pn: "PW4000", sn: "334455667",
    stage: "RFQ/capability request",
    summary: "United requests capability check for PW4000 engine component.",
    date: new Date().toUTCString(),
    from: "mro@unitedairlines.com",
    body: "Hi, can you check capabilities for PW4000 SN 334455667? RFQ 889900.",
    messages: [
      { dir:"inbound", from:"mro@unitedairlines.com", time: new Date().getHours()+":"+String(new Date().getMinutes()).padStart(2,"0"), body:"Hi, can you check capabilities for PW4000 SN 334455667? RFQ 889900." }
    ],
    docs: []
  }
];

let simIndex = 0;
setTimeout(() => {
  if (simIndex < incomingSimulation.length) {
    const newEmail = incomingSimulation[simIndex++];
    parsedEmails.unshift(newEmail);
    showToast(`New email from ${newEmail.customer} — ${newEmail.stage}`);
    // ping the card if on screen 1
    const grid = document.getElementById("customerGrid");
    if (document.getElementById("screen1").classList.contains("active")) {
      renderCustomers();
      setTimeout(() => {
        const card = document.getElementById("card-" + newEmail.customer.replace(/\s/g,"-"));
        if (card) card.classList.add("new-ping");
      }, 100);
    }
  }
}, 8000);

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderCustomers();
</script>
